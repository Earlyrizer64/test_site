site_name: Test Site
site_description: Notes, tutorials, and notebooks
site_url: https://Earlyrizer64.github.io/test_site/

theme:
  name: material

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy

  palette:
    - scheme: default
      primary: blue
      accent: indigo

    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Dark mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - About: about.md
  - Tutorials:
      - Setup: tutorials/setup.md